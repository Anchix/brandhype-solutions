<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 64" fill="none">
  <!-- Rose / cosmetics bloom icon -->
  <g transform="translate(12, 6)">
    <!-- Outer petals -->
    <ellipse cx="22" cy="12" rx="7" ry="10" fill="#E8A598" opacity="0.7" transform="rotate(-15 22 12)"/>
    <ellipse cx="34" cy="16" rx="7" ry="10" fill="#E8A598" opacity="0.7" transform="rotate(30 34 16)"/>
    <ellipse cx="34" cy="32" rx="7" ry="10" fill="#E8A598" opacity="0.7" transform="rotate(120 34 32)"/>
    <ellipse cx="22" cy="36" rx="7" ry="10" fill="#E8A598" opacity="0.7" transform="rotate(195 22 36)"/>
    <ellipse cx="10" cy="32" rx="7" ry="10" fill="#E8A598" opacity="0.7" transform="rotate(240 10 32)"/>
    <ellipse cx="10" cy="16" rx="7" ry="10" fill="#E8A598" opacity="0.7" transform="rotate(300 10 16)"/>
    <!-- Center circle -->
    <circle cx="22" cy="24" r="8" fill="#20BFA9"/>
    <circle cx="22" cy="24" r="4" fill="white" opacity="0.6"/>
    <!-- Stem -->
    <line x1="22" y1="44" x2="22" y2="52" stroke="#20BFA9" stroke-width="2" stroke-linecap="round"/>
    <path d="M22 48 Q28 44 32 46" stroke="#20BFA9" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Wordmark -->
  <text x="130" y="32" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700" fill="#20BFA9" letter-spacing="3" text-anchor="middle">SOLURA</text>
  <!-- Cosmetics tagline -->
  <text x="130" y="48" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="400" fill="#E8A598" letter-spacing="3" text-anchor="middle">COSMETICS</text>
</svg>
